<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hill Climb Racing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; user-select: none; }
  canvas { display: block; }
  #loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a2e; color: #fff; font-family: Arial, sans-serif;
    font-size: 22px; z-index: 999; flex-direction: column; gap: 12px;
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 4px solid #333; border-top-color: #e94560;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .barwrap {
    width: 200px; height: 6px; background: #333; border-radius: 3px; overflow: hidden;
  }
  #loading .bar {
    width: 0%; height: 100%; background: #e94560; border-radius: 3px; transition: width 0.3s;
  }
  #loading .pct { font-size: 13px; color: #888; }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span>Loading...</span>
  <div class="barwrap"><div class="bar" id="progbar"></div></div>
  <div class="pct" id="progpct">0%</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script src="js/game.js"></script>
</body>
</html>
